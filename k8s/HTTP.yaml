apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: flower-ns
spec:
  parentRefs:
  - name: main-gateway
    namespace: default
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: flower-svc
      namespace: flower-ns 
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /auth
    backendRefs:
    - name: flower-mongo-svc
      port: 80
