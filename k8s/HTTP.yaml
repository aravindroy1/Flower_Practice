apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
  - name: main-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /flower
    filters:
    - type: URLRewrite
      urlRewrite:
         path:
           type: ReplacePrefixMatch
           replacePrefixMatch: /
    backendRefs:
    - name: flower-svc
      port: 80