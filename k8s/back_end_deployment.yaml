apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-dep
  namespace: flower-ns
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mongo-app
    spec:
      containers:
        - name: mongo-container
          image: mongo:latest
          ports:
            - containerPort: 27017
            
      